<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" width="880" height="260" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#221b3d"/>
      <stop offset="0.55" stop-color="#141225"/>
      <stop offset="1" stop-color="#0b0b12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a37e"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="876" height="256" rx="18" fill="url(#bg)" stroke="#332b52" stroke-width="1.5"/>

  <!-- watermark lightning bolt -->
  <g opacity="0.10" transform="translate(700 30) scale(1.5)">
    <path d="M60 0 L18 78 L52 78 L8 160 L104 60 L64 60 Z" fill="url(#accent)"/>
  </g>

  <!-- left accent bar -->
  <rect x="2" y="2" width="6" height="256" rx="3" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="440" y="78" text-anchor="middle" fill="#d97757" font-size="17" font-weight="700" letter-spacing="6">⚡ CLAUDE CODE</text>

  <!-- title -->
  <text x="440" y="135" text-anchor="middle" fill="#ffffff" font-size="46" font-weight="800">Windows 1-Click Installer</text>

  <!-- subtitle -->
  <text x="440" y="174" text-anchor="middle" fill="#b6b6c9" font-size="18">One PowerShell line &#160;·&#160; No Node.js &#160;·&#160; No PATH headaches</text>

  <!-- command chip -->
  <rect x="250" y="198" width="380" height="34" rx="8" fill="#0c0c12" stroke="#3a3358"/>
  <text x="270" y="220" fill="#8a8aa3" font-size="14" font-family="Consolas, monospace">PS&gt;</text>
  <text x="298" y="220" fill="#57c7ff" font-size="14" font-family="Consolas, monospace">irm .../install.ps1 | iex</text>

  <!-- by OK -->
  <text x="852" y="244" text-anchor="end" fill="#6b6b80" font-size="13">by OK</text>
</svg>
